<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Loan Approval Predictor</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 720px; margin: 40px auto; background:#f7f7f7; }
    h1 { text-align: center; }
    .card { background:#ffffff; padding:24px 28px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.08); }
    form { display:grid; grid-template-columns:1fr 1fr; gap:14px 24px; margin-top:16px; }
    label { font-weight:bold; font-size:0.9rem; }
    input, select { width:100%; padding:6px 8px; border-radius:4px; border:1px solid #ccc; box-sizing:border-box; }
    button { padding:10px 16px; border:none; border-radius:4px; background:#0066cc; color:white; font-weight:bold; cursor:pointer; }
    button:hover { background:#004f9a; }
    .full-width { grid-column:1 / 3; }
    .result { margin-top:20px; padding:14px 18px; border-radius:6px; background:#e8f5e9; border:1px solid #c8e6c9; }
    .rejected { background:#ffebee; border-color:#ffcdd2; }
  </style>
</head>
<body>
  <h1>Loan Approval Predictor</h1>
  <div class="card">
    <form method="POST">
      <div>
        <label>Gender</label>
        <select name="Gender">
          <option value="Male">Male</option>
          <option value="Female">Female</option>
        </select>
      </div>

      <div>
        <label>Married</label>
        <select name="Married">
          <option value="Yes">Yes</option>
          <option value="No">No</option>
        </select>
      </div>

      <div>
        <label>Dependents</label>
        <select name="Dependents">
          <option value="0">0</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3+">3+</option>
        </select>
      </div>

      <div>
        <label>Education</label>
        <select name="Education">
          <option value="Graduate">Graduate</option>
          <option value="Not Graduate">Not Graduate</option>
        </select>
      </div>

      <div>
        <label>Self Employed</label>
        <select name="Self_Employed">
          <option value="No">No</option>
          <option value="Yes">Yes</option>
        </select>
      </div>

      <div>
        <label>Applicant Income</label>
        <input type="number" name="ApplicantIncome" required />
      </div>

      <div>
        <label>Coapplicant Income</label>
        <input type="number" name="CoapplicantIncome" value="0" />
      </div>

      <div>
        <label>Loan Amount</label>
        <input type="number" name="LoanAmount" required />
      </div>

      <div>
        <label>Loan Amount Term (days)</label>
        <input type="number" name="Loan_Amount_Term" value="360" />
      </div>

      <div>
        <label>Credit History (0 or 1)</label>
        <input type="number" step="1" min="0" max="1" name="Credit_History" value="1" />
      </div>

      <div>
        <label>Property Area</label>
        <select name="Property_Area">
          <option value="Urban">Urban</option>
          <option value="Semiurban">Semiurban</option>
          <option value="Rural">Rural</option>
        </select>
      </div>

      <div class="full-width">
        <button type="submit">Predict Loan Approval</button>
      </div>
    </form>

    {% if prediction %}
      <div class="result {% if prediction == 'Rejected' %}rejected{% endif %}">
        <p><strong>Prediction:</strong> {{ prediction }}</p>
        <p><strong>Approval probability:</strong> {{ probability }}%</p>
      </div>
    {% endif %}
  </div>
</body>
</html>
